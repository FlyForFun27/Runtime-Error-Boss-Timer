<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo Boss Timers</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>
    <header class="top-bar">
        <h1 class="logo-text">Neo Boss Timers</h1>
        
        <div class="global-resets">
            <div class="reset-item">
                <span class="reset-label">Daily Reset</span>
                <span id="daily-reset" class="reset-value">--:--:--</span>
            </div>
            <div class="reset-item">
                <span class="reset-label">Weekly Reset</span>
                <span id="weekly-reset" class="reset-value">--:--:--</span>
            </div>
        </div>
        
        <div class="header-controls">
            <div class="color-picker">
                <div class="color-dot" data-color="#9d4edd" style="background: #9d4edd;"></div> 
                <div class="color-dot" data-color="#4cc9f0" style="background: #4cc9f0;"></div> 
                <div class="color-dot" data-color="#f72585" style="background: #f72585;"></div> 
                <div class="color-dot" data-color="#4ade80" style="background: #4ade80;"></div> 
                <div class="color-dot" data-color="#fbbf24" style="background: #fbbf24;"></div> 
                <div class="color-dot" data-color="#f87171" style="background: #f87171;"></div> 
                <div class="color-dot" data-color="#818cf8" style="background: #818cf8;"></div> 
                <div class="color-dot" data-color="#d1d1d1" style="background: #d1d1d1;"></div> 
            </div>
     
            <div class="toggle-container">
                <span class="toggle-label">Sound</span>
                <label class="switch">
                    <input type="checkbox" id="sound-toggle" checked>
                    <span class="slider round"></span>
                </label>
            </div>

            <div class="toggle-container">
                <span class="toggle-label">Timer</span>
                <label class="switch">
                    <input type="checkbox" id="timer-toggle" checked>
                    <span class="slider round"></span>
                </label>
            </div>

            <div class="current-time" id="top-clock">--:--</div>

            <div class="settings-cog" id="settings-btn" title="Alert Settings">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                </svg>
            </div>
        </div>
    </header>

    <main class="dashboard-container">
        <div id="timers-grid" class="timers-grid"></div>
    </main>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Alert Settings</h2>
                <span class="close-modal">&times;</span>
            </div>
            
            <div class="volume-container">
                <div class="volume-header">
                    <span>Notification Volume</span>
                    <span id="volume-display">100%</span>
                </div>
                <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1">
                <button id="test-sound-btn" class="test-btn">Test Sound</button>
            </div>

            <div style="background: var(--card-inner); padding: 10px 15px; border-radius: 6px; border: 1px solid #333; margin-top: 15px;">
                <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                    <span class="toggle-label" style="font-size: 14px; color: var(--text-muted);">Server Region</span>
                    <div class="region-btn-group">
                        <button class="region-btn active" data-region="EU">EU</button>
                        <button class="region-btn" data-region="NA">NA</button>
                        <button class="region-btn" data-region="TW">TW</button>
                    </div>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; background: var(--card-inner); padding: 10px 15px; border-radius: 6px; border: 1px solid #333; margin-top: 15px;">
                <div class="toggle-container" style="width: 100%; justify-content: space-between;">
                    <span class="toggle-label">12-Hour Time (AM/PM)</span>
                    <label class="switch">
                        <input type="checkbox" id="time-format-toggle">
                        <span class="slider round"></span>
                    </label>
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid #333; margin: 15px 0;">

            <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 10px;">Enable or disable visibility and sound alerts for specific regions.</p>
            
            <div style="display: flex; justify-content: space-between; font-size: 10px; color: var(--accent-color); text-transform: uppercase; margin-bottom: 10px; padding-right: 15px;">
                <span>Region</span>
                <div style="display: flex; gap: 20px;">
                    <span title="Show Column">Visible</span>
                    <span title="Play Sound">Sound</span>
                </div>
            </div>

            <div class="modal-body" id="region-alert-list">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
