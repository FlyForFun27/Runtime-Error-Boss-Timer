<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo Boss Timers</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>
    <header class="top-bar">
        <h1 class="logo-text">Neo Boss Timers</h1>
        
        <div class="header-controls">
            <div class="color-picker">
                <div class="color-dot" data-color="#9d4edd" style="background: #9d4edd;"></div> <div class="color-dot" data-color="#4cc9f0" style="background: #4cc9f0;"></div> <div class="color-dot" data-color="#f72585" style="background: #f72585;"></div> <div class="color-dot" data-color="#4ade80" style="background: #4ade80;"></div> <div class="color-dot" data-color="#fbbf24" style="background: #fbbf24;"></div> <div class="color-dot" data-color="#f87171" style="background: #f87171;"></div> <div class="color-dot" data-color="#818cf8" style="background: #818cf8;"></div> <div class="color-dot" data-color="#d1d1d1" style="background: #d1d1d1;"></div> </div>

            <div class="toggle-container">
                <span class="toggle-label">Timer</span>
                <label class="switch">
                    <input type="checkbox" id="timer-toggle" checked>
                    <span class="slider round"></span>
                </label>
            </div>

            <div class="current-time" id="top-clock">--:-- AM</div>
        </div>
    </header>

    <main class="dashboard-container">
        <div id="timers-grid" class="timers-grid"></div>
    </main>

    <script src="script.js"></script>
</body>
</html>
